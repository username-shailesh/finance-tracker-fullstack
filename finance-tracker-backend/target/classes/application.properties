# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (Using Environment Variables for Cloud Deployment)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/finance_tracker;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-minimum-32-characters-required
jwt.expiration=86400000

# Application Configuration
spring.application.name=finance-tracker-api
logging.level.root=INFO
logging.level.com.financetracker=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Timezone
spring.jackson.time-zone=UTC
