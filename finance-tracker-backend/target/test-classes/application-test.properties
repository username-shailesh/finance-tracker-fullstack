# Test configuration - uses H2 in-memory database
# Overrides main application.properties for tests

# Use H2 in-memory database for tests (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT - test secret
jwt.secret=test-secret-key-minimum-32-characters-required-for-tests
jwt.expiration=3600000

# Logging
logging.level.root=WARN
logging.level.com.financetracker=DEBUG

# Disable file upload limit for tests
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
