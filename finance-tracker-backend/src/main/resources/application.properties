# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Configuration (Using Environment Variables for Cloud Deployment)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/finance_tracker;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.auto-commit=true
# Fix for Supabase Session Pooler - disable prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# JWT Configuration
jwt.secret=${JWT_SECRET:ZmluYW5jZVRyYWNrZXJTZWNyZXRLZXkyMDI2UHJvZHVjdGlvblNlY3VyZUtleU1pbmltdW01MTJCaXRzUmVxdWlyZWQ=}
jwt.expiration=86400000

# Application Configuration
spring.application.name=finance-tracker-api
logging.level.root=INFO
logging.level.com.financetracker=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Timezone
spring.jackson.time-zone=UTC
