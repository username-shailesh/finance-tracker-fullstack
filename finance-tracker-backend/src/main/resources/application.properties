# Server Configuration
server.port=${PORT:8080}

# Database Configuration (PostgreSQL with H2 Fallback)
spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:${DB_URL:jdbc:h2:mem:finance_tracker;DB_CLOSE_DELAY=-1;MODE=MySQL}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:${DB_DRIVER:org.h2.Driver}}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.auto-commit=true
# Fix for Supabase Session Pooler - disable prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# JWT Configuration
jwt.secret=${JWT_SECRET:ZmluYW5jZVRyYWNrZXJTZWNyZXRLZXkyMDI2UHJvZHVjdGlvblNlY3VyZUtleU1pbmltdW01MTJCaXRzUmVxdWlyZWQ=}
jwt.expiration=86400000

# Application Configuration
spring.application.name=finance-tracker-api
logging.level.root=INFO
logging.level.com.financetracker=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Timezone
spring.jackson.time-zone=UTC

# Mail Configuration (SMTP)
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
